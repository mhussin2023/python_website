<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MCQ Quiz — Colorful</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{
      --page-bg: #f6f8fb; /* page background */
      --card-bg: #ffffff; /* card background */
      --muted: #6b7280; /* gray-500 */
      --text: #0f172a; /* dark text */
      --accent: #2563eb; /* blue-600 */
      --accent-2: #06b6d4; /* cyan-500 */
      --success: #10b981; /* green-500 */
      --shadow: rgba(16,24,40,0.06);
    }
    html,body{height:100%;}
    body{
      margin:0; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      background: var(--page-bg); color:var(--text);
      display:flex; align-items:flex-start; justify-content:center; padding:80px 20px; min-height:100vh;
    }
    .wrapper{width:100%;max-width:900px;background: var(--card-bg); border-radius:12px; padding:28px; box-shadow: 0 10px 30px var(--shadow);}
    header{display:flex;align-items:center;gap:16px;margin-bottom:18px}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
    h1{margin:0;font-size:20px}
    p.lead{margin:4px 0 0;color:var(--muted)}

    #questions{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .q{background:var(--card-bg);padding:16px;border-radius:10px;border:1px solid rgba(15,23,42,0.05)}
    .q strong{display:block;margin-bottom:8px;color:var(--accent)}
    .choice{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;margin-bottom:8px;cursor:pointer;background:transparent;border:1px solid transparent}
    .choice:hover{background:linear-gradient(90deg, rgba(37,99,235,0.04), rgba(6,182,212,0.02)); border-color: rgba(37,99,235,0.06)}
    input[type="radio"]{accent-color:var(--accent);width:18px;height:18px}

    .controls{display:flex;align-items:center;justify-content:space-between;margin-top:18px}
    button{background:linear-gradient(90deg,var(--accent),#3b82f6);border:none;padding:10px 18px;border-radius:10px;color:#fff;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(59,130,246,0.12)}
    button.secondary{background:transparent;border:1px solid rgba(15,23,42,0.06);box-shadow:none;color:var(--text);}

    #result{margin-top:12px;padding:16px;border-radius:10px;background:linear-gradient(90deg, rgba(16,185,129,0.06), rgba(96,165,250,0.04));color:var(--text);text-align:center}
    #result h2{margin:0 0 8px;color:var(--success)}

    @media (max-width:700px){#questions{grid-template-columns:1fr} .wrapper{padding:18px}}

    /* result/answer classes */
    .choice.correct{background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.18)}
    .choice.selected-correct{background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.25)}
    .choice.selected-wrong{background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.18)}
    .q strong.wrong{color: #ef4444;} /* red */
    .q strong.correct-head{color: var(--success);}  
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="logo">QZ</div>
      <div>
        <h1>MCQ Quiz — 10 Questions</h1>
        <p class="lead">Choose the best answer for each question and press Submit.</p>
      </div>
    </header>

    <form id="quizForm">
      <div id="questions"></div>
      <div class="controls">
        <button type="submit">Submit</button>
        <button type="button" class="secondary" id="resetBtn">Reset</button>
      </div>
    </form>

    <div id="result" style="display:none"></div>
  </div>

  <script>
    // Static questions data for GitHub Pages (no server rendering)
    const QUESTIONS = [
      {"id":1,"text":"What is the capital of France?","a":"Paris","b":"London","c":"Berlin","answer":"a"},
      {"id":2,"text":"Which planet is known as the Red Planet?","a":"Earth","b":"Mars","c":"Jupiter","answer":"b"},
      {"id":3,"text":"What is 2 + 2?","a":"3","b":"4","c":"5","answer":"b"},
      {"id":4,"text":"Which language is this website built with?","a":"Python","b":"Java","c":"C++","answer":"a"},
      {"id":5,"text":"What color do you get by mixing red and white?","a":"Pink","b":"Green","c":"Blue","answer":"a"},
      {"id":6,"text":"Which animal barks?","a":"Cat","b":"Cow","c":"Dog","answer":"c"},
      {"id":7,"text":"Which month comes after June?","a":"May","b":"July","c":"August","answer":"b"},
      {"id":8,"text":"How many legs does a spider have?","a":"6","b":"8","c":"10","answer":"b"},
      {"id":9,"text":"What is the boiling point of water at sea level (°C)?","a":"100","b":"90","c":"80","answer":"a"},
      {"id":10,"text":"Which gas do plants absorb?","a":"Oxygen","b":"Carbon Dioxide","c":"Nitrogen","answer":"b"}
    ];

    const questionsDiv = document.getElementById('questions');
    QUESTIONS.forEach((q, idx) => {
      const div = document.createElement('div');
      div.className = 'q';
      div.innerHTML = ` <strong>${idx+1}. ${q.text}</strong>
        <label class="choice"><input type="radio" name="q${q.id}" value="a"> a) ${q.a}</label>
        <label class="choice"><input type="radio" name="q${q.id}" value="b"> b) ${q.b}</label>
        <label class="choice"><input type="radio" name="q${q.id}" value="c"> c) ${q.c}</label>`;
      questionsDiv.appendChild(div);
    });

    const form = document.getElementById('quizForm');
    const resultDiv = document.getElementById('result');
    const resetBtn = document.getElementById('resetBtn');
    const submitBtn = form.querySelector('button[type="submit"]');

    function clearHighlights(){
      document.querySelectorAll('.choice').forEach(l=>{ l.classList.remove('correct','selected-correct','selected-wrong'); });
      document.querySelectorAll('.q strong').forEach(h=>{ h.classList.remove('wrong','correct-head'); });
      document.querySelectorAll('input[type="radio"]').forEach(inp=>{ inp.disabled = false; });
    }

    function showResult(score){
      // disable submit while results are shown
      if(submitBtn) submitBtn.disabled = true;
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `<h2>Your score: ${score} / ${QUESTIONS.length}</h2><p style="color:var(--muted)">Thanks for taking the quiz.</p><div style="margin-top:8px"><button id=\"tryAgain\" style=\"padding:8px 12px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer\">Try again</button></div>`;
      document.getElementById('tryAgain').addEventListener('click', function(ev){
        ev.preventDefault();
        form.style.display = 'block';
        resultDiv.style.display = 'none';
        clearHighlights();
        form.reset();
        if(submitBtn) submitBtn.disabled = false;
        window.scrollTo({top:0,behavior:'smooth'});
      });
    }

    form.addEventListener('submit', function(e){
      e.preventDefault();
      let score = 0;
      QUESTIONS.forEach((q)=>{
        const sel = document.querySelector('input[name="q'+q.id+'"]:checked');
        const selVal = sel ? sel.value : null;
        const head = document.querySelector('input[name="q'+q.id+'"]')?.closest('.q')?.querySelector('strong');
        ['a','b','c'].forEach(val=>{
          const inp = document.querySelector('input[name="q'+q.id+'"][value="'+val+'"]');
          const lab = inp ? inp.closest('label') : null;
          if(!lab) return;
          // mark correct
          if(val === q.answer){ lab.classList.add('correct'); }
          // mark selected
          if(selVal === val){
            if(val === q.answer){ lab.classList.add('selected-correct'); score++; }
            else { lab.classList.add('selected-wrong'); }
          }
          // disable input
          if(inp) inp.disabled = true;
        });
        if(selVal !== q.answer){ if(head) head.classList.add('wrong'); } else { if(head) head.classList.add('correct-head'); }
      });
      form.style.display = 'block'; // keep visible to show highlights
      showResult(score);
      window.scrollTo({top:0,behavior:'smooth'});
    });

    resetBtn.addEventListener('click', function(){
      clearHighlights();
      form.reset();
      resultDiv.style.display = 'none';
      form.style.display = 'block';
      window.scrollTo({top:0,behavior:'smooth'});
    });
  </script>
</body>
</html>
